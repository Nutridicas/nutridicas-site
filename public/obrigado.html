<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Mensagem enviada | Nutrichef Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="css/estilo.css">

  <style>
    .obrigado {
      min-height: 70vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
      text-align: center;
    }

    .obrigado__box {
      max-width: 520px;
      background: #e6f4f1;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .obrigado__box h1 {
      color: #2f8f83;
      margin-bottom: 16px;
    }

    .obrigado__box p {
      font-size: 18px;
      margin-bottom: 24px;
    }

    .obrigado__box a {
      display: inline-block;
      padding: 12px 28px;
      background: #2f8f83;
      color: #fff;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <main class="obrigado">
    <div class="obrigado__box">
      <h1>Mensagem enviada 💚</h1>
      <p>
        Obrigada por entrar em contato!  
        Recebemos sua mensagem e retornaremos em breve.
      </p>

      <a href="index.html">Voltar para o site</a>
    </div>
  </main>

</body>
</html>
